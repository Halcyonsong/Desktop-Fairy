<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截图选择</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
  user-select: none;
  cursor: crosshair;
  font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
}
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
}
#selection {
  position: fixed;
  border: 2px solid #4a9eff;
  background: transparent;
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
  pointer-events: none;
  display: none;
}
#dimensions {
  position: fixed;
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
  pointer-events: none;
  display: none;
  white-space: nowrap;
  z-index: 10;
}
#hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255, 255, 255, 0.8);
  font-size: 16px;
  pointer-events: none;
  z-index: 5;
}
</style>
</head>
<body>
<div id="overlay"></div>
<div id="selection"></div>
<div id="dimensions"></div>
<div id="hint">拖拽选择截图区域 · 按 ESC 取消</div>
<script>
(function() {
  var overlay = document.getElementById('overlay');
  var selection = document.getElementById('selection');
  var dimensions = document.getElementById('dimensions');
  var hint = document.getElementById('hint');
  var isDragging = false;
  var startX = 0, startY = 0;

  overlay.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    isDragging = true;
    startX = e.screenX;
    startY = e.screenY;
    hint.style.display = 'none';
    selection.style.display = 'block';
    dimensions.style.display = 'block';
    selection.style.left = startX + 'px';
    selection.style.top = startY + 'px';
    selection.style.width = '0px';
    selection.style.height = '0px';
  });

  overlay.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var x = e.screenX;
    var y = e.screenY;
    var left = Math.min(startX, x);
    var top = Math.min(startY, y);
    var width = Math.abs(x - startX);
    var height = Math.abs(y - startY);
    selection.style.left = left + 'px';
    selection.style.top = top + 'px';
    selection.style.width = width + 'px';
    selection.style.height = height + 'px';
    dimensions.style.left = (left + width + 8) + 'px';
    dimensions.style.top = top + 'px';
    dimensions.textContent = width + ' × ' + height;
  });

  overlay.addEventListener('mouseup', function(e) {
    if (!isDragging) return;
    isDragging = false;
    var x = e.screenX;
    var y = e.screenY;
    var left = Math.min(startX, x);
    var top = Math.min(startY, y);
    var width = Math.abs(x - startX);
    var height = Math.abs(y - startY);
    if (width < 5 || height < 5) {
      // 区域太小，取消选择
      resetUI();
      return;
    }
    // 发送选区坐标
    window.screenshotOverlay.onSelect({ x: left, y: top, width: width, height: height });
  });

  function resetUI() {
    isDragging = false;
    hint.style.display = '';
    selection.style.display = 'none';
    dimensions.style.display = 'none';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      window.screenshotOverlay.onCancel();
    }
  });

  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    window.screenshotOverlay.onCancel();
  });
})();
</script>
</body>
</html>
